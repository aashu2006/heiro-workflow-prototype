# Rules specific to hiero-sdk-python
# This repo needs stricter review process

permissions:
  allow: [label, comment]
  deny: [close, merge]

rules:
  - event: pull_request.opened
    action: label
    label: "needs-review"

  - event: pull_request.opened
    action: comment
    message: |
      👋 Welcome to hiero-sdk-python!
      Please make sure your PR follows the Python SDK contribution guidelines.
      A maintainer will review it shortly.

  - event: pull_request.closed
    action: comment
    message: |
      ✅ Thanks for contributing to hiero-sdk-python!
