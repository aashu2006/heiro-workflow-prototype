# Default rules only this applies to any repo without a specific config

permissions:
  allow: [label, comment]
  deny: [close, merge]

rules:
  - event: pull_request.opened
    action: label
    label: "needs-review"

  - event: pull_request.opened
    action: comment
    message: |
      👋 Thanks for opening this PR!
      A maintainer will review it shortly.

  - event: pull_request.labeled
    action: comment
    message: |
      🏷️ A label was just applied to this PR. A maintainer will follow up shortly.

  - event: pull_request.closed
    action: comment
    message: |
      ✅ This PR has been closed. Thanks for your contribution!
